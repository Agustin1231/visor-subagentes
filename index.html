<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocky · Orquestador de subagentes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --white:#FFFFFF; --off-white:#F8FAFB; --light-gray:#E8EDF2; --gray:#B8C5D0;
  --dark-gray:#647987; --charcoal:#2C3E50; --navy:#1A2332;
  --blue-50:#EBF5FF; --blue-100:#D6EBFF; --blue-500:#2B7DE9; --blue-600:#1B5FCF; --blue-700:#154AB5;
  --green:#1AA06D; --green-soft:rgba(26,160,109,.14);
  --font-serif:'Playfair Display',Georgia,serif;
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --shadow-sm:0 2px 8px rgba(26,35,50,.05); --shadow-md:0 4px 16px rgba(26,35,50,.08); --shadow-lg:0 8px 32px rgba(26,35,50,.12);
  --bg:#FFFFFF; --panel:#FFFFFF; --line:#E8EDF2; --idle:#B8C5D0;
}
[data-theme="dark"]{
  --white:#1A1F2E; --off-white:#151925; --light-gray:#2A3040; --gray:#4A5568;
  --dark-gray:#A0AEC0; --charcoal:#CBD5E0; --navy:#E2E8F0;
  --blue-50:rgba(43,125,233,.1); --blue-100:rgba(43,125,233,.15); --blue-500:#4A9AF5; --blue-600:#5BA8FF; --blue-700:#6DB5FF;
  --green:#3DD98B; --green-soft:rgba(61,217,139,.16);
  --shadow-sm:0 2px 8px rgba(0,0,0,.2); --shadow-md:0 4px 16px rgba(0,0,0,.25); --shadow-lg:0 8px 32px rgba(0,0,0,.3);
  --bg:#0F1219; --panel:#151925; --line:#2A3040; --idle:#3A4456;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--charcoal);min-height:100vh;transition:background .4s,color .4s}
.wrap{max-width:1180px;margin:0 auto;padding:28px 32px 40px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.brand{display:flex;align-items:baseline;gap:14px}
h1{font-family:var(--font-serif);font-weight:700;color:var(--navy);font-size:28px;letter-spacing:-.3px}
.sub{color:var(--dark-gray);font-size:14px;font-weight:500}
.toggle{cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--charcoal);width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);transition:.25s}
.toggle:hover{border-color:var(--blue-500);color:var(--blue-600)}
.toggle svg{width:20px;height:20px}
.layout{display:grid;grid-template-columns:1fr 360px;gap:24px;margin-top:22px}
@media(max-width:980px){.layout{grid-template-columns:1fr}}
.stage{background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-md);padding:10px;position:relative;overflow:hidden}
.stage svg{width:100%;height:auto;display:block}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-md);display:flex;flex-direction:column;overflow:hidden}
.phead{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.panel h2{font-family:var(--font-serif);font-size:17px;color:var(--navy);padding:18px 20px 14px;font-weight:600}
.replay{display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--blue-600);font-family:var(--font-sans);font-weight:600;font-size:12px;padding:7px 11px;border-radius:9px;margin-right:14px;transition:.2s}
.replay:hover{border-color:var(--blue-500);background:var(--blue-50)}
.replay:disabled{opacity:.45;cursor:default}
.replay svg{width:14px;height:14px}
.log{flex:1;overflow:auto;padding:8px 10px;max-height:520px;cursor:pointer}
.entry{display:flex;gap:10px;padding:9px 10px;border-radius:10px;margin:3px 0;font-size:13px;line-height:1.45;animation:in .35s ease}
.entry .t{color:var(--dark-gray);font-variant-numeric:tabular-nums;font-size:11px;padding-top:2px;min-width:52px}
.entry .b{flex:1;color:var(--charcoal)}
.entry .b b{color:var(--navy);font-weight:600}
.entry.req{background:var(--blue-50)}
.entry.work .b b{color:var(--blue-600)}
.entry.done{background:var(--green-soft)}
.entry.done .b b{color:var(--green)}
.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:6px;margin-right:6px;background:var(--light-gray);color:var(--dark-gray)}
.tag.b{background:var(--blue-100);color:var(--blue-700)}
.tag.g{background:var(--green-soft);color:var(--green)}
.children{margin:0 0 5px 22px;padding-left:14px;border-left:2px solid var(--line)}
.children .entry{font-size:12px;padding:6px 9px;margin:2px 0}
.children .entry .t{min-width:48px;font-size:10px}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* nodes */
.node-label{font-family:var(--font-sans);font-weight:600;font-size:12.5px;fill:var(--navy)}
.node-role{font-family:var(--font-sans);font-weight:500;font-size:10px;fill:var(--dark-gray)}
.mono{font-family:var(--font-sans);font-weight:700;font-size:15px;fill:var(--dark-gray)}
.edge{stroke:var(--line);stroke-width:2;fill:none;transition:stroke .3s}
.edge.active{stroke:var(--blue-500);stroke-width:2.6}
.ring{fill:var(--panel);stroke:var(--idle);stroke-width:2.4;transition:stroke .3s,filter .3s}
.node.active .ring{stroke:var(--blue-500);filter:drop-shadow(0 0 9px var(--blue-500))}
.node.done .ring{stroke:var(--green)}
.node.active .mono{fill:var(--blue-600)}
.node.done .mono{fill:var(--green)}
.rocky-ring{fill:var(--panel);stroke:var(--blue-500);stroke-width:3}
.rocky.busy .rocky-ring{filter:drop-shadow(0 0 16px var(--blue-500));animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{stroke-width:3}50%{stroke-width:5}}
.rocky-name{font-family:var(--font-serif);font-weight:700;font-size:20px;fill:var(--navy);text-anchor:middle}
.rocky-tag{font-family:var(--font-sans);font-weight:600;font-size:11px;fill:var(--blue-600);text-anchor:middle;letter-spacing:.5px;text-transform:uppercase}
.pulse-dot{fill:var(--blue-500)}
.statebadge{font-family:var(--font-sans);font-weight:600;font-size:9.5px;text-anchor:middle}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>Rocky</h1>
      <span class="sub">Orquestador de subagentes · en vivo</span>
    </div>
    <button class="toggle" id="themeBtn" title="Cambiar tema"></button>
  </header>

  <div class="layout">
    <div class="stage">
      <svg id="graph" viewBox="0 0 900 640" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="panel">
      <div class="phead">
        <h2>Actividad</h2>
        <button class="replay" id="replayBtn" title="Reproducir de nuevo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115.5-6.3L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15.5 6.3L3 16"/></svg>
          Reproducir
        </button>
      </div>
      <div class="log" id="log" title="Click para reproducir de nuevo"></div>
    </div>
  </div>
</div>

<script>
const AGENTS = [
  {id:'redes',     name:'Redes',     role:'Contenido y marca'},
  {id:'video',     name:'Video',     role:'Motion graphics'},
  {id:'diseno',    name:'Diseño',    role:'Brandbooks'},
  {id:'finanzas',  name:'Finanzas',  role:'Reportes'},
  {id:'datos',     name:'Datos',     role:'RAG y tareas'},
  {id:'contenido', name:'Contenido', role:'Edición de video'},
  {id:'diagramas', name:'Diagramas', role:'Flujos a PNG'},
  {id:'reuniones', name:'Reuniones', role:'Transcripción'},
  {id:'bridge',    name:'Bridge',    role:'Agentes IA'},
  {id:'n8ndocs',   name:'n8n-docs',  role:'Documentación de wf'},
];
const SVGNS='http://www.w3.org/2000/svg';
const CX=450, CY=320, R=235, ROCKY_R=70, NODE_R=34;
const svg=document.getElementById('graph');
const logEl=document.getElementById('log');
const pos={};

function el(tag,attrs={},txt){const e=document.createElementNS(SVGNS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);if(txt!=null)e.textContent=txt;return e;}

function monogram(a){return a.name.replace('n8n-docs','N8').slice(0,2).toUpperCase();}

function build(){
  svg.innerHTML='';
  const edges=el('g',{id:'edges'}); svg.appendChild(edges);
  AGENTS.forEach((a,i)=>{
    const ang=(-90 + i*(360/AGENTS.length))*Math.PI/180;
    const x=CX+R*Math.cos(ang), y=CY+R*Math.sin(ang);
    pos[a.id]={x,y};
    const path=`M${CX},${CY} L${x},${y}`;
    edges.appendChild(el('path',{class:'edge',id:'edge-'+a.id,d:path}));
  });
  AGENTS.forEach(a=>{
    const {x,y}=pos[a.id];
    const g=el('g',{class:'node',id:'node-'+a.id});
    g.appendChild(el('circle',{class:'ring',cx:x,cy:y,r:NODE_R}));
    g.appendChild(el('text',{class:'mono','text-anchor':'middle',x:x,y:y+5},monogram(a)));
    g.appendChild(el('text',{class:'node-label','text-anchor':'middle',x:x,y:y+NODE_R+18},a.name));
    g.appendChild(el('text',{class:'node-role','text-anchor':'middle',x:x,y:y+NODE_R+33},a.role));
    g.appendChild(el('text',{class:'statebadge',id:'badge-'+a.id,x:x,y:y-NODE_R-9},''));
    svg.appendChild(g);
  });
  const r=el('g',{class:'rocky',id:'rocky'});
  r.appendChild(el('circle',{class:'rocky-ring',cx:CX,cy:CY,r:ROCKY_R}));
  r.appendChild(el('text',{class:'rocky-name',x:CX,y:CY-2},'Rocky'));
  r.appendChild(el('text',{class:'rocky-tag',x:CX,y:CY+18},'Orquestador'));
  svg.appendChild(r);
}

function now(){const d=new Date();return d.toLocaleTimeString('es-CO',{hour12:false});}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Oculta datos sensibles del log con asteriscos antes de mostrarlos.
function mask(s){
  if(s==null)return s;
  return String(s)
    .replace(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/g, m=>m[0]+'****@****')
    .replace(/\/(?:home|root|srv|etc|var)\/[^\s)<]+/g, '/****')
    .replace(/\b(?:Bearer|token|apikey|app[_-]?key|password|secret)\b\s*[:=]?\s*\S+/gi, m=>m.split(/[:=\s]/)[0]+' ****')
    .replace(/\b[A-Za-z0-9_-]{20,}\b/g, m=>m.slice(0,3)+'****')
    .replace(/\b\d{9,}\b/g, '****');
}
function safe(s){return esc(mask(s));}
let currentGroup=null; // contenedor de sub-acciones del llamado vigente
function makeEntry(body,kind,tag,tagcls){
  const e=document.createElement('div');e.className='entry '+kind;
  const tagHtml=tag?`<span class="tag ${tagcls}">${tag}</span>`:'';
  e.innerHTML=`<div class="t">${now()}</div><div class="b">${tagHtml}${body}</div>`;
  return e;
}
// Entrada de primer nivel (solicitud, llamado a subagente, entrega).
function logTop(body,kind='',tag,tagcls=''){
  currentGroup=null;
  logEl.appendChild(makeEntry(body,kind,tag,tagcls));
  logEl.scrollTop=logEl.scrollHeight;
}
// Sub-accion tabulada debajo del llamado vigente.
function logChild(body,kind='',tag,tagcls=''){
  (currentGroup||logEl).appendChild(makeEntry(body,kind,tag,tagcls));
  logEl.scrollTop=logEl.scrollHeight;
}

let dotTimers={};
function flow(id){
  const edge=document.getElementById('edge-'+id);if(!edge)return;
  const len=edge.getTotalLength();
  const dot=el('circle',{class:'pulse-dot',r:5});svg.appendChild(dot);
  let start=null;const dur=900;
  function step(ts){if(!start)start=ts;const p=Math.min((ts-start)/dur,1);
    const pt=edge.getPointAtLength(p*len);dot.setAttribute('cx',pt.x);dot.setAttribute('cy',pt.y);
    if(p<1)requestAnimationFrame(step);else dot.remove();}
  requestAnimationFrame(step);
}

window.viz={
  reset(){build();logEl.innerHTML='';currentGroup=null;document.getElementById('rocky').classList.remove('busy');},
  rockyBusy(b){document.getElementById('rocky').classList.toggle('busy',b);},
  request(text){this.rockyBusy(true);logTop(safe(text),'req','Solicitud','b');},
  delegate(id,text){
    const a=AGENTS.find(x=>x.id===id);
    document.getElementById('edge-'+id).classList.add('active');
    const n=document.getElementById('node-'+id);n.classList.remove('done');n.classList.add('active');
    document.getElementById('badge-'+id).textContent='trabajando';
    document.getElementById('badge-'+id).setAttribute('fill','var(--blue-600)');
    flow(id);
    // El llamado al subagente es la entrada principal; sus acciones van tabuladas debajo.
    logTop(`<b>Rocky &rarr; ${esc(a.name)}</b>: ${safe(text)}`,'work','Delegado','b');
    const kids=document.createElement('div');kids.className='children';
    logEl.appendChild(kids);currentGroup=kids;
  },
  agentMsg(id,text){const a=AGENTS.find(x=>x.id===id);logChild(`<b>${esc(a.name)}</b>: ${safe(text)}`,'work');},
  done(id,text){
    const a=AGENTS.find(x=>x.id===id);
    const n=document.getElementById('node-'+id);n.classList.remove('active');n.classList.add('done');
    document.getElementById('edge-'+id).classList.remove('active');
    const b=document.getElementById('badge-'+id);b.textContent='listo';b.setAttribute('fill','var(--green)');
    logChild(`<b>${esc(a.name)}</b>: ${safe(text)}`,'done','Listo','g');
  },
  deliver(text){this.rockyBusy(false);logTop(safe(text),'done','Rocky','g');},
};

/* theme */
const sun='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
const moon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>';
const btn=document.getElementById('themeBtn');
function setTheme(t){document.documentElement.setAttribute('data-theme',t);btn.innerHTML=t==='dark'?sun:moon;try{localStorage.setItem('visorTheme',t)}catch(e){}}
btn.onclick=()=>setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
setTheme((()=>{try{return localStorage.getItem('visorTheme')||'light'}catch(e){return 'light'}})());

/* Banco de tareas por subagente. Cada tarea: lo que pide Agustin (req), la
   instruccion de Rocky al especialista (inst), 1-2 mensajes de trabajo (act),
   el resultado (done) y la entrega final (deliver). Algunas incluyen datos
   sensibles a proposito (correos, tokens, rutas, numeros) para que se vea el
   censurado con asteriscos. Un generador elige una al azar y la anima en bucle. */
const TASKS={
  redes:[
    {req:'prográmame el contenido de esta semana en LinkedIn e Instagram', inst:'arma la parrilla semanal y deja los borradores', act:['reviso la parrilla en Outline','defino formatos: carrusel y día a día'], done:'5 publicaciones listas en borrador', deliver:'Rocky: parrilla de la semana lista para tu revisión'},
    {req:'escribe un post de LinkedIn sobre automatizar lo aburrido', inst:'redacta el post con gancho y CTA, sin emojis', act:['busco el ángulo y escribo el borrador'], done:'post redactado (280 palabras)', deliver:'Rocky: borrador de LinkedIn listo para aprobar'},
    {req:'dame 8 ideas de contenido alineadas a la marca', inst:'propón ideas con título y formato', act:['reviso qué temas funcionaron'], done:'8 ideas con título y formato sugerido', deliver:'Rocky: 8 ideas de contenido enviadas'},
    {req:'adapta el último post para Instagram', inst:'reescribe en tono cercano y agrega hashtags', act:['ajusto el copy y selecciono hashtags'], done:'caption de 60 palabras + 12 hashtags', deliver:'Rocky: versión para Instagram lista'},
    {req:'revisa el calendario y dime qué falta publicar', inst:'compara la parrilla contra lo ya publicado', act:['cruzo la parrilla con el historial'], done:'faltan 2 publicaciones del jueves', deliver:'Rocky: pendientes de la semana identificados'},
  ],
  video:[
    {req:'arma un reel vertical explicando la orquestación de subagentes', inst:'monta el motion graphic narrado con intro y outro de marca', act:['clono la voz y animo las escenas por subagente','agrego intro, outro y subtítulos'], done:'reel listo (orquestacion.mp4)', deliver:'Rocky: reel terminado y enviado por Telegram'},
    {req:'convierte esta idea en un video corto narrado', inst:'genera escenas, narra con voz clonada y exporta vertical', act:['genero las escenas y la narración'], done:'video 1080×1920 exportado', deliver:'Rocky: video corto listo para publicar'},
    {req:'ponle b-roll a la última grabación', inst:'inserta b-roll de Pexels en los cortes', act:['busco clips libres de derechos y los inserto'], done:'b-roll integrado en 6 cortes', deliver:'Rocky: video con b-roll listo'},
    {req:'hazme la portada del próximo video', inst:'arma el thumbnail vertical con titular amarillo', act:['tomo el primer frame de habla y compongo'], done:'portada lista (estilo A+D)', deliver:'Rocky: portada del video enviada'},
  ],
  diseno:[
    {req:'genera un brandbook para un cliente nuevo', inst:'corre Monica Designer y arma el brandbook', act:['defino paleta, tipografías y logo','compilo el brandbook en ZIP'], done:'brandbook entregado (brandbook.zip)', deliver:'Rocky: brandbook listo para descargar'},
    {req:'dame variaciones de logo para revisar', inst:'genera 4 propuestas de logo', act:['exploro estilos y exporto las variantes'], done:'4 propuestas de logo en PNG', deliver:'Rocky: propuestas de logo enviadas'},
    {req:'arma una paleta de colores para la marca', inst:'propón una paleta coherente con valores HEX', act:['defino primarios, secundarios y neutros'], done:'paleta de 6 colores con HEX', deliver:'Rocky: paleta de marca lista'},
  ],
  finanzas:[
    {req:'clasifica los movimientos del mes', inst:'categoriza las transacciones y arma el reporte', act:['clasifico 412 movimientos de la cuenta 1234567890','genero el donut y el histograma por cuenta'], done:'PDF del corte mensual listo', deliver:'Rocky: reporte de finanzas enviado por Telegram'},
    {req:'dime cuánto gasté esta semana por cuenta', inst:'agrupa el gasto por cuenta y total', act:['sumo por cuenta y calculo el total'], done:'gasto total y desglose por cuenta', deliver:'Rocky: resumen de gasto semanal listo'},
    {req:'arma el reporte de finanzas en PDF', inst:'genera el PDF con gráficos del periodo', act:['compilo el LaTeX con los gráficos'], done:'reporte.pdf generado', deliver:'Rocky: reporte en PDF enviado'},
    {req:'avísame de gastos fuera de lo normal', inst:'detecta movimientos atípicos del periodo', act:['comparo contra el promedio histórico'], done:'2 movimientos atípicos detectados', deliver:'Rocky: alertas de gasto enviadas'},
  ],
  datos:[
    {req:'busca en mis documentos qué acordamos sobre el proyecto X', inst:'consulta el RAG y resume lo relevante', act:['recupero los fragmentos relevantes','redacto el resumen con citas'], done:'resumen con 3 referencias', deliver:'Rocky: respuesta con fuentes enviada'},
    {req:'organiza estos archivos en Drive', inst:'clasifica y sube a la carpeta correcta', act:['ordeno por tipo y subo con rclone'], done:'archivos subidos a gdrive:Rocky/', deliver:'Rocky: archivos organizados en Drive'},
    {req:'extrae los datos clave de este PDF', inst:'parsea el documento y arma una tabla', act:['leo el PDF y extraigo los campos'], done:'tabla con 18 filas extraída', deliver:'Rocky: datos extraídos en tabla'},
    {req:'responde esta duda con base en mis notas', inst:'busca en la base de conocimiento y responde', act:['consulto las notas indexadas'], done:'respuesta encontrada en 2 notas', deliver:'Rocky: respuesta basada en tus notas'},
  ],
  contenido:[
    {req:'recórtale las pausas a esta grabación', inst:'aplica el jump-cut automático y exporta', act:['detecto silencios por envelope y corto'], done:'video sin pausas (versión D)', deliver:'Rocky: video recortado listo'},
    {req:'edita el video y déjalo listo para publicar', inst:'limpia, agrega intro/outro y exporta', act:['corto, ajusto audio y agrego la firma'], done:'edición final exportada', deliver:'Rocky: video editado enviado'},
    {req:'súbeme este video al portal porque pesa mucho', inst:'procesa la subida grande y publica el link', act:['recibo el archivo y lo proceso'], done:'video procesado en el portal', deliver:'Rocky: link del video listo'},
  ],
  diagramas:[
    {req:'arma un diagrama de cómo funciona la orquestación', inst:'arma un flujo Agustin → Rocky → especialistas y ríndelo a PNG', act:['escribo el .d2 y corro el render'], done:'PNG renderizado (orquestador.png)', deliver:'Rocky: diagrama listo y enviado por Telegram'},
    {req:'hazme un diagrama del flujo de este proceso', inst:'modela el proceso y exporta a PNG', act:['defino nodos y conexiones en mermaid'], done:'diagrama de flujo exportado', deliver:'Rocky: diagrama de flujo enviado'},
    {req:'dibuja la arquitectura de la automatización', inst:'arma el diagrama de componentes', act:['estructuro los bloques y los conecto'], done:'diagrama de arquitectura listo', deliver:'Rocky: diagrama de arquitectura enviado'},
  ],
  reuniones:[
    {req:'transcribe la reunión de hoy', inst:'transcribe el audio y guárdalo en Outline', act:['proceso el audio y transcribo','guardo en la colección Reuniones'], done:'transcripción guardada en Outline', deliver:'Rocky: transcripción de la reunión lista'},
    {req:'dame la transcripción de la última llamada', inst:'recupera la transcripción más reciente', act:['busco la grabación en Outline'], done:'transcripción recuperada', deliver:'Rocky: transcripción enviada'},
    {req:'guarda lo que se dijo en la reunión', inst:'transcribe y archiva sin resumen', act:['transcribo y archivo el texto'], done:'reunión archivada en Outline', deliver:'Rocky: reunión guardada'},
  ],
  bridge:[
    {req:'conéctate a mi PC y corre la rutina', inst:'entra por Tailscale y ejecuta la tarea', act:['conecto por SSH al equipo','ejecuto la rutina y verifico salida'], done:'rutina ejecutada sin errores', deliver:'Rocky: tarea ejecutada en tu PC'},
    {req:'dispara el webhook de publicación', inst:'envía el POST al flujo de n8n', act:['mando el POST con el token bearer sk_live_aD93kf02risensible'], done:'ejecución status=success', deliver:'Rocky: publicación disparada y verificada'},
    {req:'revisa si el servidor está arriba', inst:'verifica el estado de los servicios', act:['consulto el estado por la API'], done:'todos los servicios activos', deliver:'Rocky: servidor operativo'},
  ],
  n8ndocs:[
    {req:'documenta el workflow nuevo de n8n', inst:'describe los nodos y guárdalo en Outline', act:['recorro los nodos y documento cada paso'], done:'documentación del workflow lista', deliver:'Rocky: documentación del flujo guardada'},
    {req:'explícame qué hace este workflow', inst:'resume el propósito y los pasos del flujo', act:['analizo los nodos y el disparador'], done:'resumen del workflow en 5 pasos', deliver:'Rocky: explicación del flujo enviada'},
    {req:'revisa la documentación de los flujos', inst:'verifica que esté completa y actualizada', act:['comparo los flujos contra la doc'], done:'documentación al día', deliver:'Rocky: revisión de documentación lista'},
  ],
};
// Encadenamientos naturales: a veces una tarea dispara otra (segundo subagente).
const CHAINS={diagramas:'video', datos:'contenido', reuniones:'datos', diseno:'redes'};

const rand=a=>a[Math.floor(Math.random()*a.length)];
const ids=Object.keys(TASKS);
function buildScenario(){
  const id=rand(ids), task=rand(TASKS[id]);
  const steps=[{fn:()=>viz.request('Agustin: '+task.req)}];
  const addAgent=(aid,t)=>{
    steps.push({fn:()=>viz.delegate(aid,t.inst)});
    const acts=t.act.slice(0, Math.random()<0.5?1:t.act.length);
    acts.forEach(m=>steps.push({fn:()=>viz.agentMsg(aid,m)}));
    steps.push({fn:()=>viz.done(aid,t.done)});
    return t;
  };
  let last=addAgent(id,task);
  // ~30% de las veces encadena un segundo especialista si hay relación natural.
  if(CHAINS[id] && Math.random()<0.3){
    const id2=CHAINS[id]; last=addAgent(id2,rand(TASKS[id2]));
  }
  steps.push({fn:()=>viz.deliver(last.deliver)});
  return steps;
}

let playTimers=[];
const replayBtn=document.getElementById('replayBtn');
function play(loop){
  playTimers.forEach(clearTimeout);playTimers=[];
  viz.reset();
  replayBtn.disabled=true;
  const steps=buildScenario();
  let t=0;
  steps.forEach((s,i)=>{t+=(i===0?900:1100+Math.floor(Math.random()*700));playTimers.push(setTimeout(s.fn,t));});
  playTimers.push(setTimeout(()=>{replayBtn.disabled=false;},t+200));
  // Auto-encadena otro escenario aleatorio tras una pausa.
  if(loop!==false)playTimers.push(setTimeout(()=>play(true),t+3200));
}
replayBtn.onclick=()=>play(true);
logEl.onclick=()=>{if(!replayBtn.disabled)play(true);};

build();
play(true);
</script>
